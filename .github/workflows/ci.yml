name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Check formatting
        shell: bash
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted. Please run 'go fmt ./...'"
            gofmt -l .
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Run tests with race detection
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Run integration tests
        run: go test -tags=integration ./internal/tmux/

      - name: Run e2e tests
        run: go test -tags=e2e -v ./internal/e2e/

      - name: Build devlog
        run: go build ./cmd/devlog

      - name: Build devlog-host
        run: go build ./cmd/devlog-host

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  test-extension:
    name: Browser extension tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: browser-extension
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: browser-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run extension tests
        run: npm test

  multi-platform:
    name: Build verification (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install tmux (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install tmux (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          # Retry up to 3 times — Homebrew downloads occasionally time out on CI.
          for i in 1 2 3; do
            echo "Attempt $i: installing tmux..."
            brew install tmux && exit 0
            echo "Attempt $i failed, waiting 10s before retry..."
            sleep 10
          done
          echo "brew install tmux failed after 3 attempts"
          exit 1

      - name: Check formatting
        shell: bash
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted. Please run 'go fmt ./...'"
            gofmt -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Integration Tests
        if: runner.os != 'Windows'
        run: go test -tags=integration ./internal/tmux/

      - name: Download dependencies
        run: go mod download

      - name: Build devlog
        run: go build ./cmd/devlog

      - name: Build devlog-host
        run: go build ./cmd/devlog-host
